# Simple keepalive pings for free-tier Redis (deleted after ~7 days idle).
# Runs every ~6 days so both databases stay active.
name: Keep Redis Databases Alive

on:
  schedule:
    # Midnight UTC on days 1, 7, 13, 19, 25, 31 (~every 6 days)
    - cron: "0 0 */6 * *"
  workflow_dispatch:

jobs:
  ping-redis:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Upstash Redis
        env:
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
        run: |
          set -euo pipefail
          echo "Pinging Upstash at $(date -u +%Y-%m-%dT%H:%M:%SZ)…"
          curl --fail-with-body --silent --show-error \
            "${UPSTASH_REDIS_REST_URL}/ping" \
            -H "Authorization: Bearer ${UPSTASH_REDIS_REST_TOKEN}"
          echo ""
          echo "Upstash PONG received."

      - name: Ping Redis Cloud
        env:
          REDIS_HOST: ${{ secrets.REDIS_HOST }}
          REDIS_PORT: ${{ secrets.REDIS_PORT }}
          REDIS_USERNAME: ${{ secrets.REDIS_USERNAME }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y redis-tools
          echo "Pinging Redis Cloud at $(date -u +%Y-%m-%dT%H:%M:%SZ)…"
          redis-cli \
            -h "${REDIS_HOST}" \
            -p "${REDIS_PORT}" \
            --user "${REDIS_USERNAME}" \
            -a "${REDIS_PASSWORD}" \
            PING
          echo "Redis Cloud PONG received."
